name: Test Backend

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --group dev
        working-directory: backend

      - name: Run tests with coverage
        env:
          TEST_DATABASE_URL: postgresql+psycopg_async://postgres:changethis@localhost:5432/app_test
          SECRET_KEY: ci-secret-key-not-used-in-production
          FIRST_SUPERUSER: admin@example.com
          FIRST_SUPERUSER_PASSWORD: changethis
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
        run: |
          uv run coverage run -m pytest tests/ -v --asyncio-mode=auto
          uv run coverage report
          uv run coverage html --title "Coverage for ${{ github.sha }}"
        working-directory: backend

      - name: Store coverage files
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
